<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boston English Center - Lesson 3: Paying Bills</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "ui-sans-serif", "system-ui"],
            },
          },
        },
      };

      (function applyInitialTheme() {
        let useDark = false;
        try {
          if (window.parent && window.parent !== window) {
            useDark =
              window.parent.document.documentElement.classList.contains("dark");
          }
        } catch (e) {}

        if (!useDark) {
          const saved = localStorage.getItem("theme-preference");
          const prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          useDark = saved ? saved === "dark" : prefersDark;
        }

        document.documentElement.classList.toggle("dark", useDark);
      })();

      window.setTheme = function setTheme(theme) {
        const useDark = theme === "dark";
        document.documentElement.classList.toggle("dark", useDark);
        localStorage.setItem("theme-preference", useDark ? "dark" : "light");
      };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      .lesson-tag {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        background: rgba(79, 70, 229, 0.1);
        border-radius: 2rem;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #4f46e5;
        border: 1px solid rgba(79, 70, 229, 0.2);
      }

      .dark .lesson-tag {
        background: rgba(79, 70, 229, 0.2);
        color: #818cf8;
        border-color: rgba(129, 140, 248, 0.3);
      }

      .idiom-card {
        background: white;
        border-radius: 2rem;
        padding: 2rem;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .dark .idiom-card {
        background: #1e293b;
        border-color: #334155;
      }

      .idiom-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 50px -20px rgba(79, 70, 229, 0.3);
      }

      .teacher-cue-btn {
        background: #4f46e5;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 2rem;
        font-weight: 600;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
      }

      .teacher-cue-btn:hover {
        background: #4338ca;
        transform: scale(1.02);
      }

      .cue-tooltip {
        position: absolute;
        top: 100%;
        left: 60%;
        transform: translateX(-50%) translateY(10px);
        width: 320px;
        background: white;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
        border: 1px solid #e2e8f0;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 50;
      }

      .dark .cue-tooltip {
        background: #1e293b;
        border-color: #334155;
      }

      .group:hover .cue-tooltip {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(20px);
      }

      .real-image-container {
        border-radius: 1.5rem;
        overflow: hidden;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.2);
        border: 1px solid #e2e8f0;
      }

      .dark .real-image-container {
        border-color: #334155;
      }

      .real-image {
        width: 100%;
        height: auto;
        display: block;
        transition: transform 0.5s ease;
      }

      .real-image:hover {
        transform: scale(1.02);
      }

      .content-wrapper {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        align-items: center;
      }

      @media (max-width: 968px) {
        .grid-2 {
          grid-template-columns: 1fr;
          gap: 2rem;
        }
      }
    </style>
  </head>
  <body class="h-full overflow-x-hidden bg-slate-50 dark:bg-slate-900">
    <div
      class="fixed inset-0 bg-gradient-to-br from-indigo-50 to-white dark:from-slate-900 dark:to-indigo-950/20 pointer-events-none"
    ></div>

    <div class="relative z-10 content-wrapper pb-32">
      <div class="grid-2 w-full">
        <div class="space-y-8">
          <div>
            <span class="lesson-tag">Lesson 3 · A1 Beginner</span>
          </div>

          <h1
            class="text-5xl md:text-6xl font-black text-slate-900 dark:text-white leading-tight"
          >
            Paying Bills
          </h1>

          <div class="space-y-2">
            <p
              class="text-xl text-indigo-600 dark:text-indigo-400 font-semibold"
            >
              Unit 4
            </p>
            <p class="text-2xl text-slate-700 dark:text-slate-300">
              Home and Daily Needs
            </p>
          </div>

          <div class="idiom-card relative group" onclick="revealMeaning()">
            <p
              class="text-3xl font-bold text-slate-900 dark:text-white mb-4 leading-tight"
            >
              "Cut your coat according to your cloth"
            </p>

            <div class="relative inline-block">
              <button
                class="teacher-cue-btn"
                onclick="event.stopPropagation();"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2.5"
                    d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
                Teacher Cue
              </button>

              <div class="cue-tooltip">
                <p class="font-bold text-indigo-600 dark:text-indigo-400 mb-2">
                  Teacher cue:
                </p>
                <p class="text-slate-700 dark:text-slate-300 mb-2">
                  Present the topic and discuss the idiom which means
                </p>
                <p class="text-lg font-semibold text-slate-900 dark:text-white">
                  :Live in a way that matches what you can afford.
                </p>
              </div>
            </div>

            <div
              id="idiom-meaning"
              class="hidden mt-6 pt-6 border-t border-slate-200 dark:border-slate-700"
            >
              <p class="text-lg text-slate-600 dark:text-slate-400">
                <span class="font-bold text-indigo-600 dark:text-indigo-400"
                  >Meaning:</span
                >
                Live in a way that matches what you can afford.
              </p>
            </div>
          </div>
        </div>

        <div class="space-y-4">
          <div class="real-image-container">
            <img
              src="https://images.unsplash.com/photo-1563013544-824ae1b704d3?ixlib=rb-4.0.3&auto=format&fit=crop&w=2340&q=80"
              alt="Person paying bills with smartphone and credit card"
              class="real-image"
              onerror="this.onerror=null; this.src='https://images.pexels.com/photos/53621/calculator-calculation-insurance-finance-53621.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2';"
            />
          </div>
        </div>
      </div>
    </div>

    <script>
      const audio = {
        click: new Audio("https://remtoo.net/slider/click.wav"),
        reveal: new Audio("https://remtoo.net/slider/success.wav"),
      };
      audio.click.volume = 0.3;
      audio.reveal.volume = 0.4;

      function revealMeaning() {
        audio.click.currentTime = 0;
        audio.click.play().catch(() => {});

        const meaning = document.getElementById("idiom-meaning");

        if (meaning.classList.contains("hidden")) {
          meaning.classList.remove("hidden");
          audio.reveal.currentTime = 0;
          audio.reveal.play().catch(() => {});

          gsap.fromTo(
            meaning,
            { opacity: 0, y: -20 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }
          );
        }
      }

      window.stopSlideAudio = function () {
        Object.values(audio).forEach((a) => {
          if (a) {
            a.pause();
            a.currentTime = 0;
          }
        });
      };

      window.resetSlide = function () {
        document.getElementById("idiom-meaning").classList.add("hidden");
      };
    </script>
  </body>
</html>
